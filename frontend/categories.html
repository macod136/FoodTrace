<!DOCTYPE html>

<style>

  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>

<body data-page="categories" class="bg-background text-on-surface min-h-screen">
  <!-- TopAppBar -->
  <header class="fixed top-0 left-0 right-0 h-14 z-40 flex items-center px-4 sm:px-6 bg-surface/90 backdrop-blur-md border-b border-border-light">

  </header>

  <!-- Main Content -->
  <main class="mt-14 pb-24 px-4 sm:px-6 max-w-4xl mx-auto w-full space-y-5 flex-grow py-4">
    <div class="py-20 flex justify-center items-center">
      <div class="w-8 h-8 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>

  <footer class="w-full py-6 px-6 pb-28 flex flex-col items-center gap-3 bg-surface-container-low border-t border-border-light">
    <p class="text-label-md text-text-muted text-center">© <span class="year-footer">2026</span> 溯食光 Food Trace．所有資料僅供參考。</p>
    <div class="flex gap-6">

    </div>
  </footer>

  <!-- Bottom Navigation (always visible) -->
  <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 w-full z-50 flex justify-around items-center px-2 py-1.5 bg-surface/95 backdrop-blur-md border-t border-border-light shadow-[0_-4px_24px_rgba(0,0,0,0.06)] min-h-[60px]">
    <a id="nav-home" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl text-on-surface-variant hover:text-primary transition-all duration-200 active:scale-90" href="#">
      <span class="material-symbols-outlined text-[22px]">home</span>
      <span class="text-[10px] font-medium mt-0.5">首頁</span>
    </a>
    <a id="nav-categories" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl bg-primary text-white transition-all duration-200 active:scale-90" href="#">
      <span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1">category</span>
      <span class="text-[10px] font-semibold mt-0.5">大類</span>
    </a>
    <a id="nav-brands" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl text-on-surface-variant hover:text-primary transition-all duration-200 active:scale-90" href="#">
      <span class="material-symbols-outlined text-[22px]">storefront</span>
      <span class="text-[10px] font-medium mt-0.5">品牌</span>
    </a>

    <a id="nav-favorites" class="flex flex-col items-center justify-center px-4 py-2 rounded-2xl text-on-surface-variant hover:text-primary transition-all duration-200 active:scale-90" href="#">
      <span class="material-symbols-outlined text-[22px]">favorite</span>
      <span class="text-[10px] font-medium mt-0.5">收藏</span>

  <script src="shared.js?v=no-sidebar" defer></script>
